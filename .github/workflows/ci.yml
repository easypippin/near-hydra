name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: MCP tool registration smoke
        run: npm test
      - name: MCP end-to-end stdio test
        run: node scripts/mcp-e2e.mjs
      - name: CLI smoke
        run: node packages/cli/dist/index.js config
